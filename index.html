<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SysArch Studio — システム構成図エディタ</title>
  <meta name="description" content="ブラウザだけで動くモダンなシステム構成図エディタ。SVG / PNG でスライドに貼れる形で書き出せます。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234d8dff'/%3E%3Cg fill='none' stroke='white' stroke-width='2' stroke-linecap='round'%3E%3Crect x='6' y='6' width='8' height='6' rx='1.5'/%3E%3Crect x='18' y='20' width='8' height='6' rx='1.5'/%3E%3Cpath d='M10 12v5a3 3 0 0 0 3 3h5'/%3E%3C/g%3E%3C/svg%3E" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <!-- Three.js ambient background -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>
  <div class="bg-veil" aria-hidden="true"></div>

  <div class="app">
    <!-- ===== Top bar ===== -->
    <header class="topbar glass">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 32 32" width="26" height="26" aria-hidden="true">
            <rect width="32" height="32" rx="9" fill="url(#lg)"/>
            <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#4d8dff"/><stop offset="1" stop-color="#38d5c0"/>
            </linearGradient></defs>
            <g fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="6" y="6" width="8" height="6" rx="1.5"/>
              <rect x="18" y="20" width="8" height="6" rx="1.5"/>
              <path d="M10 12v5a3 3 0 0 0 3 3h5"/>
            </g>
          </svg>
        </div>
        <div class="brand-text">
          <strong>SysArch&nbsp;Studio</strong>
          <span>system architecture editor</span>
        </div>
      </div>

      <div class="topbar-actions">
        <div class="seg" role="group" aria-label="編集">
          <button data-act="undo" class="icon-btn" title="元に戻す (Ctrl+Z)">↶</button>
          <button data-act="redo" class="icon-btn" title="やり直し (Ctrl+Y)">↷</button>
        </div>
        <div class="seg" role="group" aria-label="ズーム">
          <button data-act="zoom-out" class="icon-btn" title="縮小">−</button>
          <button data-act="zoom-fit" class="text-btn" title="全体表示 (F)"><span id="zoom-label">100%</span></button>
          <button data-act="zoom-in" class="icon-btn" title="拡大">＋</button>
        </div>
        <button data-act="grid" class="text-btn toggle is-on" title="グリッド表示">⊞ グリッド</button>
        <div class="spacer"></div>
        <button data-act="theme" class="text-btn" title="テーマ切替">◐ テーマ</button>
        <button data-act="save" class="text-btn" title="JSON保存 (Ctrl+S)">保存</button>
        <button data-act="load" class="text-btn" title="JSON読み込み">開く</button>
        <div class="menu-wrap">
          <button data-act="export" class="primary-btn">書き出し ▾</button>
          <div class="menu" id="export-menu" hidden>
            <button data-export="svg">SVG で保存 <em>ベクター・再編集可</em></button>
            <button data-export="png">PNG で保存 <em>スライド貼付向け・2x</em></button>
            <button data-export="png4">PNG で保存 <em>高解像度・4x</em></button>
            <button data-export="clipboard">PNG をコピー <em>クリップボードへ</em></button>
          </div>
        </div>
      </div>
    </header>

    <!-- ===== Left palette ===== -->
    <aside class="palette glass" id="palette">
      <div class="palette-head">
        <input type="search" id="palette-search" placeholder="部品を検索…" autocomplete="off" />
      </div>
      <div class="palette-body" id="palette-body"><!-- populated by JS --></div>
      <div class="palette-hint">
        ドラッグでキャンバスへ配置<br/>
        ノードの端をドラッグで接続
      </div>
    </aside>

    <!-- ===== Canvas ===== -->
    <main class="stage">
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>

      <!-- floating hint on empty -->
      <div class="empty-hint" id="empty-hint">
        <div class="empty-card">
          <div class="eh-title">キャンバスは空です</div>
          <p>左の部品をドラッグ、またはダブルクリックで配置。<br/>デモを読み込んで雰囲気を確認できます。</p>
          <div class="eh-actions">
            <button data-act="demo" class="primary-btn">デモを読み込む</button>
            <button data-act="dismiss-hint" class="text-btn">閉じる</button>
          </div>
        </div>
      </div>

      <!-- minimap -->
      <div class="minimap glass" id="minimap" title="ミニマップ">
        <svg id="minimap-svg"></svg>
        <div class="mm-view" id="mm-view"></div>
      </div>
    </main>

    <!-- ===== Right inspector ===== -->
    <aside class="inspector glass" id="inspector">
      <div class="insp-empty" id="insp-empty">
        <div class="insp-empty-icon">◎</div>
        <p>ノードや線を選択すると<br/>ここで編集できます</p>
        <div class="insp-tips">
          <div><kbd>Del</kbd> 削除</div>
          <div><kbd>Ctrl</kbd>+<kbd>D</kbd> 複製</div>
          <div><kbd>Space</kbd>+ドラッグ パン</div>
          <div>ホイール ズーム</div>
        </div>
      </div>
      <div class="insp-body" id="insp-body" hidden><!-- populated by JS --></div>
    </aside>
  </div>

  <input type="file" id="file-input" accept="application/json,.json" hidden />
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
